{% extends "base.html" %}
{% block title %}Decode - StegoSecure{% endblock %}
{% block content %}

<h2 class="mb-4"><i class="bi bi-unlock"></i> Decode a Hidden Message</h2>

<div class="row">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label fw-semibold">Stego Image</label>
            <input class="form-control" type="file" name="stego_image" accept=".png,.jpg,.jpeg,.bmp" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Encryption Key <span class="text-muted">(if used during encoding)</span></label>
            <input class="form-control" type="text" name="enc_key" placeholder="Leave blank if not encrypted">
          </div>
          <button class="btn btn-primary w-100" type="submit"><i class="bi bi-search"></i> Extract Hidden Message</button>
        </form>
      </div>
    </div>
  </div>

  <div class="col-lg-6">
    {% if extracted_message %}
    <div class="card border-success h-100">
      <div class="card-body">
        <h5 class="text-success"><i class="bi bi-check-circle-fill"></i> Message Extracted</h5>
        <div class="bg-light rounded p-3 mt-2" style="white-space: pre-wrap;">{{ extracted_message }}</div>
      </div>
    </div>
    {% else %}
    <div class="card h-100">
      <div class="card-body d-flex flex-column align-items-center justify-content-center text-center text-muted">
        <i class="bi bi-chat-square-text fs-1"></i>
        <p class="mt-3">The extracted hidden message will appear here.</p>
      </div>
    </div>
    {% endif %}
  </div>
</div>

{% endblock %}
